databases:
  - name: traderdb
    databaseName: traderdb
    user: trader
    plan: free

services:
  - type: web
    name: claude-trader
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: traderdb
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ACCOUNT_BALANCE
        value: "10000.0"
      - key: MAX_DAILY_LOSS_PCT
        value: "0.02"
      - key: KELLY_FRACTION
        value: "0.25"
      - key: CIRCUIT_BREAKER_LOSSES
        value: "8"
