<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BTC Perp Trader{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #0d1117; color: #c9d1d9; font-size: 13px; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; gap: 24px; align-items: center; }
    nav .logo { color: #f0883e; font-weight: bold; font-size: 15px; }

    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

    .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
    .card h2 { color: #f0883e; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

    .stat { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 12px; text-align: center; }
    .stat .value { font-size: 22px; font-weight: bold; color: #f0f6fc; }
    .stat .label { font-size: 11px; color: #8b949e; margin-top: 4px; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
    .badge-green { background: #1a472a; color: #56d364; }
    .badge-red { background: #4a1212; color: #f85149; }
    .badge-yellow { background: #3d3315; color: #d29922; }
    .badge-blue { background: #0d419d; color: #79c0ff; }
    .badge-gray { background: #21262d; color: #8b949e; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 8px; color: #8b949e; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #30363d; }
    td { padding: 8px; border-bottom: 1px solid #21262d; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1c2128; }

    .long { color: #56d364; }
    .short { color: #f85149; }

    .alert-bar { padding: 10px 24px; font-size: 12px; font-weight: bold; text-align: center; }
    .alert-red { background: #4a1212; color: #f85149; border-bottom: 1px solid #f85149; }
    .alert-green { background: #1a472a; color: #56d364; border-bottom: 1px solid #56d364; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% block alert %}{% endblock %}
  <nav>
    <span class="logo">⚡ BTC PERP TRADER</span>
    <a href="/dashboard/">Dashboard</a>
    <a href="/chart/">Chart</a>
    <a href="/status">API Status</a>
    <a href="/health">Health</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
